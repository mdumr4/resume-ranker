ai_usage_summary: |
  Used the Antigravity AI Agent extensively for architectural design, code generation, ONNX INT8 quantization, and iterative pipeline optimization to fit within the strict 5-minute CPU constraint.

methodology_summary: |
  A 3-Stage Pipeline executed entirely locally on CPU.
  - Stage 1: Hybrid Search. We run FAISS Dense Vector Search (Qwen3-Embedding GGUF) and SPLADE Sparse Search (ONNX INT8), fused via RRF to retrieve the Top 100 candidates in ~11 seconds.
  - Stage 2: Two-Phase Reranking. We run all 100 candidates through a two-part Tech/Logistics weighted fusion (70% Tech, 30% Logistics) using ms-marco-MiniLM-L-12-v2 in ~18 seconds.
  - Stage 3: Generative Reasoning. We run a background llama-server with Qwen2.5-0.5B-Instruct to batch-generate 100 candidate rationales with shared prompt caching in ~123 seconds. Total runtime is ~3.6 minutes.

declarations:
