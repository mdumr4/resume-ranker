# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
   "Our candidate ranking pipeline uses a hybrid retrieval and reranking architecture
    optimized for CPU-only inference. First, dense semantic retrieval using Qwen
    embeddings and sparse lexical retrieval using SPLADE are combined through
    Reciprocal Rank Fusion to shortlist the top candidates from a large pool.

    Candidate quality is improved using a trust scoring system based on profile
    verification, engagement signals, and career gap analysis, helping reduce noisy
    or suspicious profiles.

    The shortlisted candidates are then re-ranked using a cross-encoder that
    evaluates both technical skill match and logistics compatibility. Final ranking
    combines these scores to produce accurate candidate ordering.

    The system also generates concise reasoning for each ranked candidate and runs
    fully offline on CPU within the 5-minute hackathon constraint".

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        # I have read submission_spec.md in full
  code_is_original_work: true       # My code is my team's original work (using AI as a tool is fine)
  no_collusion: true                # I have not coordinated my submission with other teams
  honeypot_check_done: true       # OPTIONAL — set true if you explicitly checked for honeypots in your ranking
  reproduction_tested: true         # I have tested that my reproduce_command runs end-to-end
