ai_usage_summary: |
  Used the Antigravity AI Agent extensively for architectural design, code generation, ONNX INT8 quantization, and iterative pipeline optimization to fit within the strict 5-minute CPU constraint.

methodology_summary: |
  A 3-Stage Pipeline executed entirely locally on a CPU.
  - Stage 1: Hybrid Search. We run FAISS Dense Vector Search (Qwen Embeddings) combined with SPLADE Sparse Search, fused using RRF to filter all 100,000 candidates down to a Top 100 list in ~10 seconds.
  - Stage 2: Semantic Re-Ranking. We run the Top 50 candidates through an INT8-quantized BGE-M3 Cross-Encoder for deep semantic scoring in ~115 seconds.
  - Stage 3: LLM Reasoning. We execute Qwen2.5-0.5B-Instruct locally via continuous batching in llama-server to generate 100 rationales simultaneously in ~145 seconds. Total runtime is ~5.1 minutes.

